<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you! — JJ Entertainments</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(160deg, #ffe3f1 0%, #e7f4ff 55%, #f3ecff 100%);
      padding: 40px 20px;
    }
    .thanks-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 50px 40px;
      max-width: 560px;
    }
    .thanks-emoji { font-size: 4rem; animation: float 4s ease-in-out infinite; }
    .thanks h1 { font-size: clamp(2rem, 5vw, 2.8rem); color: var(--ink); }
    .thanks p { color: var(--muted); font-size: 1.15rem; }
  </style>
</head>
<body>
  <main class="thanks">
    <div class="thanks-card">
      <div class="thanks-emoji">🍭</div>
      <h1>Thank you!</h1>
      <p>
        Your candy floss enquiry is on its way to JJ Entertainments.
        We'll get back to you very soon with availability and a quote.
      </p>
      <p>In the meantime, have a sweet day! 🎉</p>
      <a href="index.html" class="btn btn-primary">Back to the website</a>
    </div>
  </main>
</body>
</html>
